<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <h1>Quiz de Anime</h1>
        <nav class="navigation-animes">
            <a href="">Dragon Ball Z</a>
            <a href="">Bleach</a>
            <a href="">Naruto</a>
            <a href="">Death Note</a>
            <a href="">One Piece</a>
        </nav>
    </header>

    <div class="container">
        <div class="quiz-container">
            <p id="current"></p>

            <div class="quiz">
                <h2 id="question"></h2>

                <div id="answers"></div>

                <button id="btn">Próxima</button>
            </div>
        </div>

        <div class="score">
            <p id="score">Pontuação: 0</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
